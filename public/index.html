<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="referrer" content="no-referrer">

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hub.dovahkin.uk/" />
  <meta property="og:title" content="Dovahkin Hub" />
  <meta property="og:description" content="Welcome to Dovahkin Personal Links" />
  <meta property="og:image" content="https://i.imgur.com/uGzHq7t.png" />

  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://hub.dovahkin.uk/" />
  <meta property="twitter:title" content="Dovahkin Hub" />
  <meta property="twitter:description" content="Welcome to Dovahkin Personal Links" />
  <meta property="twitter:image" content="https://i.imgur.com/uGzHq7t.png" />

  <link rel="icon" type="image/png" sizes="64x64" href="https://i.imgur.com/uGzHq7t.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://i.imgur.com/uGzHq7t.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://i.imgur.com/uGzHq7t.png">
  <link rel="icon" type="image/png" href="https://i.imgur.com/uGzHq7t.png" />
  <link rel="stylesheet" type="text/css" href="/loading-screen.css" />
  <link rel="stylesheet" type="text/css" href="/theme-fonts.css" media="print" onload="this.media='all'" />
  
  <title>Dovahkin Hub</title>
</head>

<body>
  <div id="app">
    <div class="loading-placeholder" id="loader">
      <h1>Dovahkin Hub</h1>
      <p class="loading">Loading... </p>
      <div class="catastrophic-error" id="err-wrap" style="display:none;">
        <p class="err-l1">It looks like something's gone wrong...</p>
        <p class="err-l2">
          This is likely caused by the app source not being found at the current domain
        </p>
        <p class="err-l2">
          If you need additional support, check the browser console then 
          <a href="https://github.com/Lissy93/dashy/blob/master/.github/SUPPORT.md">
            raise a ticket
          </a>
        </p>
      </div>
    </div>
  </div>
  <noscript>
    <strong>Sorry, JavaScript needs to be enabled to run Dovahkin Hub 😥</strong>
  </noscript>
  
  <script>
    setTimeout(() => {
      const loaderElem = document.getElementById('loader');
      if (loaderElem) loaderElem.classList.add('still-not-loaded');
    }, 7500);
  </script>
</body>
</html>
